{% extends 'base.html' %} {% block title %} Search Users {% endblock %} 
{% block content %}

<div class="container">
  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <h2 class="mb-4">Search Users</h2>

      <div class="input-group">
        <input
          type="text"
          name="q"
          class="form-control"
          placeholder="Search by username..."
          value="{{ query }}"
          hx-get="{% url 'accounts:user_search' %}"
          hx-trigger="keyup changed delay:300ms"
          hx-target="#search-results"
          hx-swap="innerHTML"
        />
      </div>
    </div>
  </div>

  <div id="search-results">
    {% include 'accounts/partials/search_results.html' %}
  </div>
</div>

{% endblock %}
