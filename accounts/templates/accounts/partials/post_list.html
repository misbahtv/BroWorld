{% for post in page_obj %}

<div class="card mb-4">
  <div class="card-header d-flex justify-content-between align-items-center">
    <div>
      <strong>{{ post.user.username }}</strong>

      <small class="text-muted ms-2"> {{ post.created_at }} </small>
    </div>

    <a
      href="{% url 'accounts:profile' post.user.id %}"
      class="btn btn-outline-primary btn-sm"
    >
      View Profile
    </a>
  </div>

  <div class="card-body">
    <p>{{ post.content }}</p>

    {% if post.image %}

    <img src="{{ post.image.url }}" class="img-fluid rounded" />

    {% endif %}
  </div>

  <div class="card-footer d-flex align-items-center gap-2">
 {% include 'posts/partials/like_section.html' %}

    <a
      href="{% url 'posts:detail_post' post.id %}"
      class="btn btn-outline-secondary btn-sm"
    >
      Comment
    </a>
  </div>
</div>

{% endfor %} {% if page_obj.has_next %}

<div
  hx-get="?page={{ page_obj.next_page_number }}"
  hx-trigger="revealed"
  hx-swap="outerHTML"
>
  <div class="text-center py-3">Loading more posts...</div>
</div>

{% endif %}
