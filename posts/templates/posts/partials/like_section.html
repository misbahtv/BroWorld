<div id="like-section-{{ post.id }}">

    <button
        hx-post="{% url 'posts:toggle_like' post.id %}"
        hx-target="#like-section-{{ post.id }}"
        hx-swap="outerHTML"
        class="btn btn-outline-primary btn-sm"
    >
        {% if post.user_liked %}
        Unlike
        {% else %}
        Like
        {% endif %}
    </button>

    <span>
        {{ post.likes.count }} Like{{ post.likes.count|pluralize }}
    </span>

</div>
