<div id="like-section-{{ post.id }}">
  <button
    hx-post="{% url 'posts:toggle_like' post.id %}"
    hx-target="#like-section-{{ post.id }}"
    hx-swap="outerHTML"
    class="btn btn-link text-decoration-none p-0"
  >
    {% if post.user_liked %}
    <i class="bi bi-heart-fill text-danger fs-4"></i>
    {% else %}
    <i class="bi bi-heart fs-4 text-dark"></i>
    {% endif %}
  </button>

  <span class="ms-2">
    {{ post.like_count }}
  </span>
</div>
