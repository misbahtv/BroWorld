{% load static %}

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>{% block title %} BroWorld {% endblock %}</title>

    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}" />

    {% block extra_css %} {% endblock %}
  </head>

  <body class="bg-light" hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="{% url 'accounts:feed' %}"> BroWorld </a>

        <div>
          {% if request.user.is_authenticated %}

          <span class="text-white me-3"> {{ request.user.username }} </span>

          <a
            href="{% url 'accounts:logout' %}"
            class="btn btn-outline-light btn-sm"
          >
            Logout
          </a>

          {% else %}

          <a
            href="{% url 'accounts:login' %}"
            class="btn btn-outline-light btn-sm me-2"
          >
            Login
          </a>

          <a
            href="{% url 'accounts:register' %}"
            class="btn btn-primary btn-sm"
          >
            Register
          </a>

          {% endif %}
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <div class="container py-4">{% block content %} {% endblock %}</div>

    {% block extra_js %} {% endblock %}
    <script src="{% static 'js/htmx.min.js' %}"></script>
  </body>
</html>
